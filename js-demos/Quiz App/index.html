<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Quiz</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f4; }
        .quiz-box { background: white; padding: 20px; display: inline-block; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        button { display: block; width: 200px; margin: 10px auto; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="quiz-box">
        <h2 id="question">Question goes here</h2>
        <div id="options"></div>
        <h2 id="result"></h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
